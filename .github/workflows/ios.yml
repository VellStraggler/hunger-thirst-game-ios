name: iOS CI
on:
  push:
    branches:
      - main
  pull_request:
    
jobs:
  build-and-test:
    runs-on: macos-latest
        
    steps:
    - name: Checkout
      uses: actions/checkout@v4
                
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build and Test
      run: |
        xcodebuild test \
          -project TextSurvival.xcodeproj \
          -scheme TextSurvival \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
